preset: standard
enabled: true
ironLaws:
  enforceErrors: true
  warnWarnings: true
validators:
  checkpoint: true
  passesGate: true
  cso: false
governance:
  level: standard
  docs:
    sync_command: harness sync-docs
    check_on_ci: true
    files:
      - CAPABILITIES.md
      - README.md
  context_files:
    enabled: true
    required_dirs:
      - src
  changelog:
    format: keep-a-changelog
    auto_append: false
  testing:
    test_first: true
    coverage_threshold: 85
    incremental_coverage: false
