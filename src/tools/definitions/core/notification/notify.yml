# notify.yml - 发送通知
# ============================================================================
# 工具类型: 通知
# 用途: 发送通知到指定渠道
# ============================================================================

name: notification/notify
description: |
  发送通知到指定渠道
  
  支持渠道：
  - discord
  - slack
  - email（待实现）

input:
  - name: channel
    type: string
    required: true
    enum: [discord, slack, email]
    description: 通知渠道
  
  - name: message
    type: string
    required: true
    description: 通知内容
  
  - name: title
    type: string
    required: false
    description: 通知标题（可选）

output:
  - name: success
    type: boolean
    description: 是否发送成功
  
  - name: message_id
    type: string
    description: 消息 ID

# 实现说明
implementation:
  type: script
  script: ./notify.sh
  note: |
    使用通知队列发送消息
    
    1. 写入通知到队列文件
    2. 由 OpenClaw heartbeat 检查并发送
    3. 支持 discord 和 queue 渠道

# 元数据
metadata:
  author: Agent Studio
  version: 1.0.0
  tags:
    - notification
    - discord
    - communication