# commit.yml - Git 提交
# ============================================================================
# 能力类型: git 操作（工具型）
# 执行方式: 纯脚本，不调用 Agent
# ============================================================================

name: git-commit
description: Git 提交更改

input:
  repo_path:
    type: path
    required: true
    description: 仓库路径
    
  message:
    type: string
    required: true
    description: 提交消息
    
  add_all:
    type: boolean
    required: false
    description: 是否添加所有更改（可选，默认 true）
    default: true

output:
  commit_hash:
    type: string
    description: 提交哈希

script: |
  #!/bin/bash
  set -euo pipefail
  
  REPO_PATH="{{repo_path}}"
  MESSAGE="{{message}}"
  ADD_ALL="{{add_all}}"
  
  cd "$REPO_PATH"
  
  echo "📝 提交更改..."
  echo "  路径: $REPO_PATH"
  echo "  消息: $MESSAGE"
  
  # 添加文件
  if [ "$ADD_ALL" = "true" ]; then
    git add -A
  fi
  
  # 检查是否有更改
  if git diff --cached --quiet; then
    echo "⚠️ 没有更改需要提交"
    echo "COMMIT_HASH=none"
    exit 0
  fi
  
  # 提交
  git commit -m "$MESSAGE"
  
  COMMIT_HASH=$(git rev-parse --short HEAD)
  
  echo ""
  echo "✅ 提交成功: $COMMIT_HASH"
  echo "COMMIT_HASH=$COMMIT_HASH"
