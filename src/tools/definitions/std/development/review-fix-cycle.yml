# review-fix-cycle.yml - Review → Fix 循环
# ============================================================================
# 类型: 复合步骤
# 用途: 对任务执行 review → fix → re-review 循环直到通过
# Superpowers: per-task review - Review 循环封装
# ============================================================================
#
# 使用场景：
# - 在工作流中需要重复执行 review → fix 循环
# - 避免在每个工作流中重复写循环逻辑
#
# 输入：任务 + 最大迭代次数
# 输出：是否通过 + 迭代次数 + 最终分数
# ============================================================================

name: review-fix-cycle
stage: develop
description: |
  对任务执行 review → fix → re-review 循环，直到通过或达到最大迭代次数。
  
  流程：
  1. Review 任务代码
  2. 如果通过 → 结束
  3. 如果未通过 → Fix 问题
  4. Re-review
  5. 循环直到通过或达到最大迭代
  
  这是 Superpowers per-task review 的循环封装。
category: development
version: 1.0.0

# 输入定义
inputs:
  - name: task
    type: object
    required: true
    description: 任务对象
    properties:
      id:
        type: string
      name:
        type: string
      description:
        type: string
      acceptance:
        type: array
  
  - name: project
    type: object
    required: true
    description: 项目上下文
    properties:
      path:
        type: string
      tech_stack:
        type: object
  
  - name: max_iterations
    type: number
    default: 3
    description: 最大迭代次数（默认 3 次）
  
  - name: pass_threshold
    type: number
    default: 70
    description: 通过阈值（默认 70 分）

# 输出定义
outputs:
  - name: passed
    type: boolean
    description: 是否最终通过
  
  - name: iterations
    type: number
    description: 实际迭代次数
  
  - name: final_score
    type: number
    description: 最终 Review 分数
  
  - name: issues_fixed
    type: array
    description: 修复的问题列表
  
  - name: remaining_issues
    type: array
    description: 剩余未解决的问题
  
  - name: history
    type: array
    description: 每次迭代的记录
    items:
      type: object
      properties:
        iteration:
          type: number
        score:
          type: number
        issues_found:
          type: number
        issues_fixed:
          type: number

# 执行配置
execute:
  type: composite
  
  # 初始状态
  initial_state:
    iteration: 0
    passed: false
    score: 0
    history: []
  
  # 循环步骤
  steps:
    # Step 1: Review
    - id: review
      step: quality/review-task
      inputs:
        task: "${inputs.task}"
        files_changed: "${state.current_files || initial_files}"
        project: "${inputs.project}"
      outputs:
        passed: review_passed
        score: review_score
        issues: review_issues
    
    # Step 2: 检查是否通过
    - id: check-passed
      condition: "${steps.review.review_passed == true || steps.review.review_score >= inputs.pass_threshold}"
      action: set_state
      state:
        passed: true
        final_score: "${steps.review.review_score}"
      then: break  # 跳出循环
    
    # Step 3: 检查是否达到最大迭代
    - id: check-max-iterations
      condition: "${state.iteration >= inputs.max_iterations}"
      action: set_state
      state:
        passed: false
        final_score: "${steps.review.review_score}"
        remaining_issues: "${steps.review.review_issues}"
      then: break  # 跳出循环
    
    # Step 4: Fix 问题
    - id: fix-issues
      step: development/fix-issues
      inputs:
        issues: "${steps.review.review_issues}"
        project: "${inputs.project}"
        task: "${inputs.task}"
      outputs:
        fixes_applied: fixes
        files_changed: fixed_files
    
    # Step 5: 更新状态
    - id: update-state
      action: set_state
      state:
        iteration: "${state.iteration + 1}"
        current_files: "${steps.fix-issues.fixed_files}"
        history: |
          ${state.history + [{
            iteration: state.iteration + 1,
            score: steps.review.review_score,
            issues_found: steps.review.review_issues.length,
            issues_fixed: steps.fix-issues.fixes.length
          }]}
  
  # 循环条件
  loop_condition: "${state.passed == false && state.iteration < inputs.max_iterations}"

# 前置条件
preconditions:
  - condition: "${inputs.task.id != null}"
    message: "任务 ID 不能为空"
  
  - condition: "${inputs.max_iterations > 0}"
    message: "最大迭代次数必须大于 0"

# 后置处理
postprocess:
  - name: generate_summary
    description: 生成执行摘要
    
  - name: log_result
    message: |
      Review-Fix 循环完成
      任务: ${inputs.task.id}
      迭代次数: ${outputs.iterations}/${inputs.max_iterations}
      最终分数: ${outputs.final_score}
      结果: ${outputs.passed ? '✅ 通过' : '❌ 未通过'}

# 示例
example: |
  ## 在工作流中使用
  
  ```yaml
  - id: develop-with-review
    step: development/review-fix-cycle
    inputs:
      task: "${current_task}"
      project: "${project}"
      max_iterations: 3
      pass_threshold: 70
    outputs:
      passed: task_passed
      final_score: task_score
  ```
  
  ## 输出示例
  
  ```json
  {
    "passed": true,
    "iterations": 2,
    "final_score": 85,
    "issues_fixed": [
      {"severity": "warning", "message": "缺少错误处理"},
      {"severity": "warning", "message": "命名不规范"}
    ],
    "remaining_issues": [],
    "history": [
      {"iteration": 1, "score": 65, "issues_found": 3, "issues_fixed": 2},
      {"iteration": 2, "score": 85, "issues_found": 1, "issues_fixed": 1}
    ]
  }
  ```
