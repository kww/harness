# implement.yml - 实现进化建议
# ============================================================================
# 类型: 进化类步骤
# 执行方式: Agent 执行
# 用途: 实现已批准的进化建议
# 核心理念: 审计 → 实现 → 验证 → 归档
# ============================================================================

name: implement
stage: govern
description: 实现已批准的进化建议
category: evolution
version: 1.0.0

# Agent 配置
agent: codex
temperature: 0.3

# 可用工具
tools:
  - file-read
  - file-write
  - bash
  - git

# 输入定义
inputs:
  - name: project_path
    type: string
    required: true
    description: 项目路径
  
  - name: evolution_item_id
    type: string
    required: true
    description: 进化建议 ID (EVOL-NNN 或 GAP-YYYYMMDD-NNN)
  
  - name: auto_verify
    type: boolean
    default: true
    description: 实现后是否自动验证

# 输出定义
outputs:
  - name: status
    type: string
    enum: [implemented, failed, needs_review]
    description: 实现状态
  
  - name: changes
    type: array
    description: 变更列表
    items:
      type: object
      properties:
        file:
          type: string
        action:
          type: string
          enum: [created, modified, deleted]
        description:
          type: string
  
  - name: verification_result
    type: object
    description: 验证结果（如果 auto_verify=true）
    properties:
      passed:
        type: boolean
      errors:
        type: array
  
  - name: commit_hash
    type: string
    description: Git commit hash（如果有提交）

# Prompt 模板
prompt: |
  你需要实现一个已批准的进化建议。
  
  ## 项目路径
  {{project_path}}
  
  ## 进化建议 ID
  {{evolution_item_id}}
  
  ## 执行步骤
  
  1. **加载进化建议**
     读取 `.agent/evolution-backlog.yml`，找到 ID 对应的建议项
  
  2. **分析实现方案**
     - 查看建议的解决方案
     - 确认实现范围
     - 评估影响
  
  3. **实施变更**
     根据建议类型执行相应操作：
     - add_capability: 创建新的工具/步骤文件
     - adjust_constraint: 修改约束配置
     - enhance_context: 更新上下文提供逻辑
     - fix_workflow: 修复工作流步骤
     - upgrade_agent: 更新 Agent 配置
  
  4. **验证实现**
     {{#if auto_verify}}
     - 运行相关测试
     - 验证功能正常
     {{/if}}
  
  5. **更新状态**
     - 更新 evolution-backlog.yml 中的状态为 implemented
     - 记录实现时间和变更内容
  
  6. **Git 提交**
     - 提交变更
     - commit message 格式: `evolution: 实现进化建议 {evolution_item_id}`

# 元数据
metadata:
  author: Agent Studio
  tags:
    - evolution
    - implementation
    - capability
