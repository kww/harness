# update-tasks.yml - 更新任务清单
# ============================================================================
# 类型: 内置处理器
# 用途: 更新 tasks.yml，保留已完成的任务，合并新任务
# ============================================================================

name: update-tasks
stage: plan
description: 更新任务清单（iterative 模式）
category: planning
version: 1.0.0

# 输入定义
inputs:
  - name: existing_tasks
    type: object
    description: 已有的任务清单（从 load-tasks 获取）
    required: true
  
  - name: new_requirements
    type: string
    description: 新需求描述
    required: true
  
  - name: architecture_impact
    type: object
    description: 架构影响分析结果
  
  - name: project_path
    type: string
    description: 项目路径
    required: true

# 输出定义
outputs:
  - name: tasks.yml
    type: file
    description: 更新后的任务清单文件
  
  - name: updated_count
    type: number
    description: 新增任务数量
  
  - name: preserved_count
    type: number
    description: 保留的已完成任务数量

# 执行配置
execute:
  type: builtin
  handler: update-tasks
