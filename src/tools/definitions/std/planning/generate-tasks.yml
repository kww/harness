# generate-tasks.yml - 生成任务清单
# ============================================================================
# 类型: 内置处理器
# 用途: 从 requirements.md 和 architecture.md 生成 tasks.yml
# ============================================================================

name: generate-tasks
stage: plan
description: 根据需求文档和架构设计生成开发任务清单
category: planning
version: 2.0.0

# 输入定义
inputs:
  - name: project_path
    type: string
    description: 项目路径
  
  - name: project_name
    type: string
    description: 项目名称（可选）

# 输出定义
outputs:
  - name: tasks.yml
    type: file
    description: 任务清单文件
  
  - name: tasks_count
    type: number
    description: 生成的任务数量

# 执行配置
execute:
  type: builtin
  handler: generate-tasks
