# quick/implement - 实现快速功能
#
# 输入：
#   - project_path: 项目路径
#   - analysis: 分析结果
#   - feature_description: 功能描述
#
# 输出：
#   - implementation: 实现结果

id: quick/implement
stage: develop
name: 实现功能
description: 快速实现功能
category: quick
agent: codex

inputs:
  project_path:
    type: string
    description: 项目路径
    required: true
  analysis:
    type: object
    description: 分析结果
    required: true
  feature_description:
    type: string
    description: 功能描述
    required: true

outputs:
  - name: implementation
    type: object
    description: 实现结果

prompt: |
  你是一个快速原型开发工程师。请根据分析结果实现功能。
  
  **功能描述**: {{feature_description}}
  
  **分析结果**:
  ```json
  {{analysis}}
  ```
  
  **项目路径**: {{project_path}}
  
  **要求**：
  1. 按照分析计划实现
  2. 保持代码简洁清晰
  3. 添加必要的错误处理
  4. 保持与现有代码风格一致
  
  **输出格式**（JSON）：
  ```json
  {
    "files_created": ["new-file.ts"],
    "files_modified": ["existing-file.ts"],
    "implementation_notes": "实现说明",
    "api_endpoints": ["/api/health"],
    "key_functions": ["healthCheck()"]
  }
  ```

temperature: 0.1
timeout: 180  # 3 分钟
