# generate-report.yml - 生成约束检查报告
# ============================================================================
# 类型: 汇总步骤
# 用途: 汇总所有约束检查结果，生成报告
# ============================================================================

name: generate-report
stage: govern
description: 生成约束检查汇总报告
category: reporting
version: 1.0.0

inputs:
  - name: project_path
    type: path
    required: true
    description: 项目路径
  
  - name: constraint_level
    type: string
    required: true
    description: 约束级别
  
  - name: feature_list_result
    type: object
    required: true
    description: feature_list 检查结果
  
  - name: decomposition_result
    type: object
    required: true
    description: 功能拆解检查结果
  
  - name: progress_result
    type: object
    required: true
    description: progress 检查结果
  
  - name: output_format
    type: string
    default: summary
    enum: [summary, detailed, json]
    description: 输出格式

outputs:
  - name: passed
    type: boolean
    description: 是否通过所有约束
  
  - name: total_checks
    type: number
    description: 总检查项数
  
  - name: passed_checks
    type: number
    description: 通过的检查项数
  
  - name: violations
    type: array
    description: 所有违规项
  
  - name: report
    type: object
    description: 详细报告
  
  - name: report_file
    type: path
    description: 报告文件路径

# Prompt
prompt: |
  你是约束检查报告生成器。请汇总所有检查结果生成报告。
  
  ## 项目信息
  
  项目路径: {{project_path}}
  约束级别: {{constraint_level}}
  
  ## 检查结果
  
  ### feature_list.json 检查
  ```json
  {{feature_list_result}}
  ```
  
  ### 功能拆解检查
  ```json
  {{decomposition_result}}
  ```
  
  ### progress.json 检查
  ```json
  {{progress_result}}
  ```
  
  ## 报告生成
  
  根据 output_format 生成报告：
  
  ### summary 格式（默认）
  
  ```
  🔍 Long-Running Agents 约束检查
  
  项目路径: {{project_path}}
  约束级别: {{constraint_level}}
  
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  
  检查项                    状态    说明
  ────────────────────────────────────────────
  feature_list.json         ✅/⚠️/❌   ...
  功能拆解                  ✅/⚠️/❌   ...
  progress.json             ✅/⚠️/❌   ...
  
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  
  结果: ✅ 通过 / ❌ 失败 (N/M)
  
  违规项: [列表]
  ```
  
  ### detailed 格式
  
  包含每个检查项的详细信息、错误列表、建议修复
  
  ### json 格式
  
  ```json
  {
    "passed": true/false,
    "total_checks": N,
    "passed_checks": N,
    "violations": [...],
    "checks": {
      "feature_list": {...},
      "decomposition": {...},
      "progress": {...}
    }
  }
  ```
  
  ## 输出
  
  将报告保存到: {{project_path}}/.constraint-report.json
  
  同时输出 JSON 格式的 passed/total_checks/passed_checks/violations/report