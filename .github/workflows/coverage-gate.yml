name: Coverage Gate

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史来对比覆盖率

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: Check coverage threshold
        run: |
          node -e "
            const data = require('./coverage/coverage-final.json');
            let total = 0, covered = 0;
            for (const info of Object.values(data)) {
              const s = info.s || {};
              const hits = Object.values(s);
              total += hits.length;
              covered += hits.filter(v => v > 0).length;
            }
            const pct = (covered / total * 100).toFixed(1);
            if (parseFloat(pct) < 80) {
              console.error('❌ Coverage ' + pct + '% is below threshold 80%');
              process.exit(1);
            }
            console.log('✅ Coverage: ' + pct + '% (' + covered + '/' + total + ' statements)');
          "

      - name: Check coverage not decreased (PR only)
        if: github.event_name == 'pull_request'
        run: |
          cov() { node -e "
            const data = require('./coverage/coverage-final.json');
            let t=0,c=0;
            for(const i of Object.values(data)){const s=i.s||{};const h=Object.values(s);t+=h.length;c+=h.filter(v=>v>0).length;}
            console.log((c/t*100).toFixed(1));
          "; }
          git checkout ${{ github.base_ref }}
          npm ci && npm test -- --coverage
          BASE_COVERAGE=$(cov)
          git checkout -
          npm ci && npm test -- --coverage
          PR_COVERAGE=$(cov)
          echo "Base coverage: $BASE_COVERAGE%"
          echo "PR coverage: $PR_COVERAGE%"
          DECREASE=$(echo "$BASE_COVERAGE - $PR_COVERAGE" | bc)
          if (( $(echo "$DECREASE > 1" | bc -l) )); then
            echo "❌ Coverage decreased by $DECREASE%"
            exit 1
          fi
          echo "✅ Coverage check passed"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
